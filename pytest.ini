[pytest]
asyncio_mode = auto
testpaths = tests
addopts =
    --strict-markers
    -v
    --tb=short
markers =
    unit: Tests unitarios (sin DB, sin red)
    integration: Tests de integración (DB en memoria, mocks externos)
    e2e: Tests end-to-end (app completa)
    slow: Tests lentos (excluir con -m 'not slow')
