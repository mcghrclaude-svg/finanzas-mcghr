# Plataforma Financiera MCGHR — Docker Compose
# Uso local (PC Windows) y Raspberry Pi.
#
# Comandos:
#   docker compose up -d              # inicia todos los servicios
#   docker compose --env-file .env.staging up -d   # entorno staging
#   docker compose down               # detiene y elimina contenedores
#   docker compose logs -f backend    # logs del backend

services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file: .env.prod        # cambia a .env.dev/.env.staging según necesidad
    volumes:
      - ${ONEDRIVE_PATH}:/data/onedrive:ro   # solo lectura desde OneDrive
      - ${BACKUP_PATH}:/data/backups
      - db_data:/data/db
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db_data:
    driver: local
